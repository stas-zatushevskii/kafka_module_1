services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_SCHEMA_REGISTRY_URL: "schema-registry:8081"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  kafka-init:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      cub kafka-ready -b kafka:9092 1 30 &&
      kafka-topics --create --if-not-exists
      --topic test-topic
      --bootstrap-server kafka:9092
      --partitions 4
      --replication-factor 1
      "

  application:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - ./.env
    deploy:
      replicas: 2
    environment:
      BATCH_MODE_CONSUMER_GROUP_ID: ${BATCH_MODE_CONSUMER_GROUP_ID}
      SINGLE_MODE_CONSUMER_GROUP_ID: ${SINGLE_MODE_CONSUMER_GROUP_ID}
      TOPIC_NAME: ${TOPIC_NAME}
      BOOTSTRAP_SERVER: ${BOOTSTRAP_SERVER}
      ACK_MESSAGE: ${ACK_MESSAGE}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL}
      FETCH_MIN_BYTES: ${FETCH_MIN_BYTES}
      FETCH_MAX_MS: ${FETCH_MAX_MS}
